version: '3.9'

# Overlay stack: API + MySQL.
services:
  api:
    # Node API container (MySQL config).
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_CLIENT: mysql
      DATABASE_URL: mysql://root:root@mysql:3306/wearefamily
      TENANT_MODE: saas
      DEFAULT_TENANT_ID: tenant-demo
      AUTO_MIGRATE: 'true'
      AUTH_REQUIRED: 'true'
      JWT_SECRET: 'change-me-in-production'
      JWT_ISSUER: 'wearefamily-api'
      JWT_EXPIRES_IN: '12h'
      UPLOAD_DIR: /app/uploads
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

  mysql:
    # MySQL database container.
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wearefamily
    ports:
      - '3306:3306'
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  uploads-data:
