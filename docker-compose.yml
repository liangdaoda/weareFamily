# Default stack: API + PostgreSQL.
services:
  api:
    # Node API container.
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:20-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DB_CLIENT: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/wearefamily
      TENANT_MODE: saas
      DEFAULT_TENANT_ID: tenant-demo
      AUTO_MIGRATE: 'true'
      AUTH_REQUIRED: 'true'
      JWT_SECRET: 'change-me-in-production'
      JWT_ISSUER: 'wearefamily-api'
      JWT_EXPIRES_IN: '12h'
      UPLOAD_DIR: /app/uploads
      BENCHMARK_PROVIDER: nbs
      BENCHMARK_NBS_ENDPOINT: https://data.stats.gov.cn/easyquery.htm
      BENCHMARK_NBS_DB_CODE: hgnd
      BENCHMARK_NBS_INDICATOR: A0A0101
      BENCHMARK_SOURCE: nbs-hgnd-a0a0101
      BENCHMARK_REGION: CN
      BENCHMARK_CURRENCY: CNY
      BENCHMARK_FETCH_INTERVAL_HOURS: 168
      BENCHMARK_TIMEOUT_MS: 8000
      BENCHMARK_DEFAULT_ANNUAL_INCOME: 36000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

  postgres:
    # PostgreSQL database container.
    image: ${POSTGRES_IMAGE:-docker.m.daocloud.io/library/postgres:16-alpine}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wearefamily
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d wearefamily']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
  uploads-data:
